name: weekly pnl snapshot

on:
  schedule:
    # 週一多次執行（防止排程跳過）→ 原本時段內每小時 2 次
    - cron: "0 0,2,4,7,10 * * 1"
    - cron: "30 0,2,4,7,10 * * 1"

  workflow_dispatch:
    inputs:
      week_key:
        description: "可選：手動補某週，格式 YYYY-MM-DD，例如 2026-03-23"
        required: false
        default: ""
      force:
        description: "是否覆寫已存在的週快照"
        required: false
        default: "false"

jobs:
  run-weekly-pnl-snapshot:
    runs-on: ubuntu-latest

    steps:
      - name: Call weekly pnl snapshot API
        shell: bash
        run: |
          set -euo pipefail

          WEEK_KEY="${{ github.event.inputs.week_key }}"
          FORCE="${{ github.event.inputs.force }}"

          if [ -n "${WEEK_KEY}" ]; then
            BODY=$(printf '{"week_key":"%s","force":%s}' "${WEEK_KEY}" "${FORCE}")
          else
            BODY='{}'
          fi

          echo "Request body: ${BODY}"

          RESPONSE=$(curl -sS --fail-with-body -X POST "${MONEYFLOW_AXIS_BASE_URL}/api/admin/weekly-pnl-snapshot" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            --data "${BODY}")

          echo "API response:"
          echo "${RESPONSE}"

          echo "${RESPONSE}" | grep '"ok":[[:space:]]*true'
        env:
          MONEYFLOW_AXIS_BASE_URL: ${{ secrets.MONEYFLOW_AXIS_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
